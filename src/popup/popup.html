<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>WebMonitor Pro</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; width: 320px; background: #f5f5f5; }
    h2 { margin: 0 0 8px 0; font-size: 15px; display: flex; align-items: center; gap: 4px; }
    .task { background: #fff; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
    .task .name { font-weight: 600; font-size: 13px; }
    .task .val { font-size: 16px; color: #1677ff; margin: 2px 0; }
    .task .meta { font-size: 11px; color: #888; }
    .status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; }
    .status.on { background: #52c41a; }
    .status.off { background: #d9d9d9; }
    a { color: #1677ff; text-decoration: none; font-size: 13px; }
    .empty { color: #999; font-size: 13px; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <h2>🦐 WebMonitor Pro</h2>
  <div id="tasks"></div>
  <div style="margin-top:8px;text-align:center">
    <a href="#" id="openOptions">⚙️ 打开设置</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
